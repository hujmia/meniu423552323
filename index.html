    }
    .Desc.visible { display: flex; }

      flex-direction: column; font-family: Inter;

    }

      background: #050505e6; justify-content: flex-start; align-items: center;
      flex-direction: column; gap: .15vw; border-radius: .20vw;

    .PWrapper .PElements .PScroll span {

    }

      justify-content: center; align-items: center; flex-direction: column;

    .PWrapper .PCategories {

    .PWrapper .PCategories .PCategory {

      align-items: center; flex-direction: column; background-color: #0009;
      border-radius: .3125vw; overflow-y: hidden;

    .PWrapper .PTabs .PTab {

      min-height: 1.5625vw; max-height: 1.5625vw; justify-content: center; align-items: center;

      text-overflow: ellipsis; white-space: nowrap; align-items: center;

    }

      position: relative; right: .15vw; width: 2.3438vw; height: .2083vw;

    }
    .PWrapper .PTabs .PTab .TOptions .Checkbox {

      top: auto; transform: none;
    }

    .PWrapper .PTabs .PTab .Scrollable {

      justify-content: center; align-items: center; flex-direction: row; gap: .2604vw;

    .PWrapper .PTabs .PTab .TOptions .Scrollable {

    .PWrapper .PTabs .PTab .Divider {

      flex-direction: row; gap: .2604vw;

    .PWrapper .PTabs .PTab .Divider .Left,

      position: fixed; bottom: .6vw; right: .6vw; display: flex;

      align-items: center; gap: .55vw; pointer-events: auto;
      background: rgba(0,0,0,0.90); border: .12vw solid rgba(var(--menu-color), 0.85);
      box-shadow: 0 0 .4vw rgba(var(--menu-color), 0.15);
      border-radius: .15vw; color: #fff; font-family: Inter;
      opacity: 0; transform: translateY(1.2vw) translateX(140%);
      transition: opacity .25s ease, transform .85s cubic-bezier(.19,1,.22,1);

    .Notification .NotificationDesc { font-size: .64vw; color: #e5e5e5; }

    .OverlayPanel {

      background: rgba(0,0,0,0.85); border: .05vw solid rgba(var(--menu-color),0.3);

      background: rgba(0,0,0,0.9); border: .08vw solid rgba(var(--menu-color),0.6);

</head>

// State
let state = {
  visible: false,
  categoryIndex: 0,
  depth: 0,        // 0 = categories list, 1 = subtab list, 2 = items
  subtabIndex: 0,
  selectedIndex: 0,
  scrollOffset: 0,
  username: "Pulse",
  bannerLink: "",
  bannerColor: "210, 210, 210",
  menuScale: 100,
  menuX: 22,
  menuY: 50,
  dragMode: null,
  showKeybinds: false,
  showSpectator: false,
  subMenuStack: [],
  keybindsX: 1, keybindsY: 10,
  spectatorX: 85, spectatorY: 10,
  activeBanner: 0,
};
const MAX_VISIBLE = 9;

function getCurrentItems() {
  if (state.depth === 0) {
    return MENU_DATA.categories.map(c => ({ type: "subMenu", label: c.label }));
  }
  const cat = MENU_DATA.categories[state.categoryIndex];
  if (!cat) return [];
  if (state.depth === 1) {
    return cat.subtabs.map(st => ({ type: "subMenu", label: st.label }));
  }
  if (state.subMenuStack.length > 0) {
    return state.subMenuStack[state.subMenuStack.length - 1].items;
  }
  const sub = cat.subtabs[state.subtabIndex];
  return sub ? sub.items : [];
}

function applyScale() {
  const s = state.menuScale / 100;
  document.documentElement.style.setProperty("--menu-scale", s);
  const wrapper = document.getElementById("menuWrapper");
  wrapper.style.transform = `scale(${s})`;
}

function applyPositions() {
  const wrapper = document.getElementById("menuWrapper");
  wrapper.style.left = state.menuX + "%";
  wrapper.style.top = state.menuY + "%";
  const kb = document.getElementById("keybindsPanel");
  kb.style.left = state.keybindsX + "vw";
  kb.style.top = state.keybindsY + "vw";
  kb.style.right = "auto";
  const sp = document.getElementById("spectatorPanel");
  sp.style.left = state.spectatorX + "vw";
  sp.style.top = state.spectatorY + "vw";
  sp.style.right = "auto";
}

function applyBanner() {
  const banner = document.getElementById("banner");
  const cfg = BANNER_CONFIG[state.activeBanner];
  if (cfg && cfg.url) {
    banner.innerHTML = `<img src="${cfg.url}" draggable="false"><span class="banner-text">PULSE</span>`;
  } else {
    banner.innerHTML = `<span class="banner-text">PULSE</span>`;
  }
  if (state.bannerLink) {
    banner.innerHTML = `<img src="${state.bannerLink}" draggable="false"><span class="banner-text">PULSE</span>`;
  }
}

function render() {
  const wrapper = document.getElementById("menuWrapper");
  const descBar = document.getElementById("descBar");
  if (!state.visible) {
    wrapper.classList.remove("visible");
    descBar.classList.remove("visible");
    return;
  }
  wrapper.classList.add("visible");

  document.documentElement.style.setProperty("--menu-color", state.bannerColor);
  applyScale();
  applyPositions();

  // Overlays
  document.getElementById("keybindsPanel").classList.toggle("visible", state.showKeybinds);
  document.getElementById("spectatorPanel").classList.toggle("visible", state.showSpectator);

  // Categories bar - breadcrumb
  const catBar = document.getElementById("categoriesBar");
  catBar.innerHTML = "";
  const bc = document.createElement("div");
  bc.className = "PCategory active";
  bc.style.flex = "1";
  if (state.depth === 0) {
    bc.innerHTML = `<span>Main Menu</span>`;
  } else if (state.depth === 1) {
    const cat = MENU_DATA.categories[state.categoryIndex];
    bc.innerHTML = `<span>Main Menu › ${cat ? cat.label : ""}</span>`;
  } else {
    const cat = MENU_DATA.categories[state.categoryIndex];
    const sub = cat ? cat.subtabs[state.subtabIndex] : null;
    bc.innerHTML = `<span>${cat ? cat.label : ""} › ${sub ? sub.label : ""}</span>`;
  }
  catBar.appendChild(bc);

  // Items
  const items = getCurrentItems();
  const total = items.length;

  if (state.selectedIndex >= total) state.selectedIndex = total - 1;
  if (state.selectedIndex < 0) state.selectedIndex = 0;
  if (state.selectedIndex < state.scrollOffset) state.scrollOffset = state.selectedIndex;
  if (state.selectedIndex >= state.scrollOffset + MAX_VISIBLE) state.scrollOffset = state.selectedIndex - MAX_VISIBLE + 1;
  if (state.scrollOffset < 0) state.scrollOffset = 0;

  const container = document.getElementById("tabsContainer");
  const selectorBar = document.getElementById("selectorBar");
  while (container.children.length > 1) container.removeChild(container.lastChild);

  const visibleItems = items.slice(state.scrollOffset, state.scrollOffset + MAX_VISIBLE);
  const relIdx = state.selectedIndex - state.scrollOffset;

  visibleItems.forEach((item, vi) => {
    const tab = document.createElement("div");
    tab.className = "PTab" + (vi === relIdx ? " active" : "");

    if (item.type === "divider") {
      tab.innerHTML = `<div class="Divider"><div class="Left"></div><span class="Label">${item.label}</span><div class="Right"></div></div>`;
    } else {
      const isSelected = vi === relIdx;
      const showVal = isSelected && (item.type === "slider" || item.type === "slider-checkbox");
      let labelHtml = `<span class="PTLabel">${showVal ? item.label + ": " + item.value : item.label}</span>`;
      let controlHtml = "";

      if (item.type === "checkbox") {
        controlHtml = `<div class="Checkbox ${item.checked ? "Checked" : ""}"><div class="Inside"></div></div>`;
      } else if (item.type === "slider") {
        const pct = item.max !== item.min ? ((item.value - item.min) / (item.max - item.min)) * 100 : 0;
        controlHtml = `<div class="Slider"><div class="Progress" style="width:${pct}%"><div class="Thumb"></div></div></div>`;
      } else if (item.type === "slider-checkbox") {
        const pct = item.max !== item.min ? ((item.value - item.min) / (item.max - item.min)) * 100 : 0;
        controlHtml = `<div class="TOptions"><div class="Slider"><div class="Progress" style="width:${pct}%"><div class="Thumb"></div></div></div><div class="Checkbox ${item.checked ? "Checked" : ""}"><div class="Inside"></div></div></div>`;
      } else if (item.type === "scrollable") {
        const val = item.values && item.value ? item.values[item.value - 1] || "" : "";
        const display = isSelected ? `< ${val} >` : val;
        controlHtml = `<div class="Scrollable"><span>${display}</span></div>`;
      } else if (item.type === "scrollable-checkbox") {
        const val = item.values && item.value ? item.values[item.value - 1] || "" : "";
        const display = isSelected ? `< ${val} >` : val;
        controlHtml = `<div class="TOptions"><div class="Scrollable"><span>${display}</span></div><div class="Checkbox ${item.checked ? "Checked" : ""}"><div class="Inside"></div></div></div>`;
      } else if (item.type === "subMenu") {
        controlHtml = `<span class="arrow-right">›</span>`;
      }
      tab.innerHTML = labelHtml + controlHtml;
    }
    container.appendChild(tab);
  });

  selectorBar.style.top = (relIdx * 1.5625) + "vw";
  selectorBar.style.height = "1.5625vw";

  const scrollThumb = document.getElementById("scrollThumb");
  if (total > MAX_VISIBLE) {
    const thumbH = Math.max(10, (MAX_VISIBLE / total) * 90);
    const thumbTop = (state.scrollOffset / (total - MAX_VISIBLE)) * (90 - thumbH);
    scrollThumb.style.height = thumbH + "%";
    scrollThumb.style.top = thumbTop + "%";
  } else {
    scrollThumb.style.height = "90%";
    scrollThumb.style.top = "0";
  }

  // Footer
  const cat = MENU_DATA.categories[state.categoryIndex];
  let footerText = "";
  if (state.depth === 0) {
    footerText = "Main Menu  " + (state.selectedIndex + 1) + " / " + total;
  } else if (state.depth === 1) {
    footerText = (cat ? cat.label : "") + "  " + (state.selectedIndex + 1) + " / " + total;
  } else {
    const subName = cat && cat.subtabs[state.subtabIndex] ? cat.subtabs[state.subtabIndex].label : "";
    footerText = subName + "  " + (state.selectedIndex + 1) + " / " + total;
  }
  document.getElementById("footerIndicator").textContent = footerText;

  descBar.classList.remove("visible");

  applyBanner();
}

// Handle special settings actions
function handleSettingsAction(item) {
  if (item.id === "menuPosition") {
    enterDragMode("menu");
    return true;
  }
  if (item.id === "keybindsPosition") {
    state.showKeybinds = true;
    enterDragMode("keybinds");
    return true;
  }
  if (item.id === "spectatorPosition") {
    state.showSpectator = true;
    enterDragMode("spectator");
    return true;
  }
  return false;
}

function handleSettingsValueChange(item) {
  if (item.id === "menuScale") {
    state.menuScale = item.value;
    applyScale();
  }
  if (item.id === "showKeybinds") {
    state.showKeybinds = item.checked;
  }
  if (item.id === "showSpectator") {
    state.showSpectator = item.checked;
  }
  if (item.id === "communityDesigns") {
    state.activeBanner = item.value - 1;
    applyBanner();
  }
}

// Drag mode
let dragState = { active: false, startX: 0, startY: 0, origX: 0, origY: 0 };

function enterDragMode(target) {
  state.dragMode = target;
  document.body.classList.add("drag-mode");
  document.getElementById("dragHint").classList.add("visible");
  showNotification("info", "Position Mode", "Drag with mouse, Backspace to save", 3000);
}

function exitDragMode() {
  state.dragMode = null;
  dragState.active = false;
  document.body.classList.remove("drag-mode");
  document.getElementById("dragHint").classList.remove("visible");
  showNotification("info", "Position Saved", "New position saved successfully", 2000);
  render();
}

document.addEventListener("mousedown", (e) => {
  if (!state.dragMode) return;
  dragState.active = true;
  dragState.startX = e.clientX;
  dragState.startY = e.clientY;
  if (state.dragMode === "menu") {
    dragState.origX = state.menuX;
    dragState.origY = state.menuY;
  } else if (state.dragMode === "keybinds") {
    dragState.origX = state.keybindsX;
    dragState.origY = state.keybindsY;
  } else if (state.dragMode === "spectator") {
    dragState.origX = state.spectatorX;
    dragState.origY = state.spectatorY;
  }
  e.preventDefault();
});

document.addEventListener("mousemove", (e) => {
  if (!dragState.active || !state.dragMode) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if (state.dragMode === "menu") {
    state.menuX = dragState.origX + (dx / window.innerWidth) * 100;
    state.menuY = dragState.origY + (dy / window.innerHeight) * 100;
    const wrapper = document.getElementById("menuWrapper");
    wrapper.style.left = state.menuX + "%";
    wrapper.style.top = state.menuY + "%";
  } else if (state.dragMode === "keybinds") {
    state.keybindsX = dragState.origX + (dx / window.innerWidth) * 100;
    state.keybindsY = dragState.origY + (dy / window.innerHeight) * 100;
    const kb = document.getElementById("keybindsPanel");
    kb.style.left = state.keybindsX + "vw";
    kb.style.top = state.keybindsY + "vw";
  } else if (state.dragMode === "spectator") {
    state.spectatorX = dragState.origX + (dx / window.innerWidth) * 100;
    state.spectatorY = dragState.origY + (dy / window.innerHeight) * 100;
    const sp = document.getElementById("spectatorPanel");
    sp.style.left = state.spectatorX + "vw";
    sp.style.top = state.spectatorY + "vw";
  }
});

document.addEventListener("mouseup", () => { dragState.active = false; });

// Message handler (for Lua SendDuiMessage)
window.addEventListener("message", (event) => {
  const data = event.data;
  if (!data || typeof data !== "object") return;

  if (data.action === "resetNav") {
    state.depth = 0;
    state.categoryIndex = 0;
    state.subtabIndex = 0;
    state.selectedIndex = 0;
    state.scrollOffset = 0;
    state.subMenuStack = [];
  }
  if (data.action === "showUI") {
    state.visible = !!data.visible;
    if (data.username) state.username = data.username;
    render();
  }
  if (data.action === "updateBanner") {
    if (data.bannerLink) state.bannerLink = data.bannerLink;
    if (data.bannerColor) {
      state.bannerColor = data.bannerColor;
    }
    render();
  }
  if (data.action === "updateElements") {
    if (data.elements) {
      const cat = MENU_DATA.categories[state.categoryIndex];
      if (cat && cat.subtabs[state.subtabIndex]) {
        cat.subtabs[state.subtabIndex].items = data.elements;
      }
    }
    if (typeof data.index === "number") state.selectedIndex = data.index;
    if (typeof data.categoryIndex === "number") state.categoryIndex = data.categoryIndex;
    render();
  }
  if (data.action === "keydown" && typeof data.index === "number") {
    state.selectedIndex = data.index;
    render();
  }
  if (data.action === "keyInput" && data.key) {
    const keyMap = { "W": "ArrowUp", "S": "ArrowDown", "A": "ArrowLeft", "D": "ArrowRight", "Enter": "Enter", "Backspace": "Backspace", "F6": "F6" };
    const mapped = keyMap[data.key] || data.key;
    document.dispatchEvent(new KeyboardEvent("keydown", { key: mapped, bubbles: true }));
  }
  if (data.action === "updateItemState") {
    let targetItem = null;
    if (state.subMenuStack.length > 0) {
      const top = state.subMenuStack[state.subMenuStack.length - 1];
      if (top.items[data.index]) targetItem = top.items[data.index];
    } else {
      const cat = MENU_DATA.categories[data.cat];
      if (cat) {
        const sub = cat.subtabs[data.sub];
        if (sub && sub.items[data.index]) targetItem = sub.items[data.index];
      }
    }
    if (targetItem) {
      if (data.checked !== undefined) targetItem.checked = data.checked;
      if (data.value !== undefined) targetItem.value = data.value;
      if (data.scrollValue !== undefined) targetItem.value = data.scrollValue;
    }
    render();
  }
  if (data.action === "pushSubMenu" && data.items) {
    state.subMenuStack.push({ items: data.items, prevSel: state.selectedIndex });
    state.selectedIndex = 0;
    state.scrollOffset = 0;
    render();
  }
  if (data.action === "popSubMenu") {
    if (state.subMenuStack.length > 0) {
      const prev = state.subMenuStack.pop();
      state.selectedIndex = prev.prevSel || 0;
      state.scrollOffset = 0;
      if (data.items && state.subMenuStack.length > 0) {
        state.subMenuStack[state.subMenuStack.length - 1].items = data.items;
      }
    }
    render();
  }
  if (data.action === "showNotification" && data.title) {
    showNotification(data.type || "info", data.title, data.desc || "", data.duration || 4000);
  }
  if (data.action === "displayFreecam") {
    document.getElementById("freecamOverlay").classList.toggle("visible", !!data.visible);
  }
  if (data.action === "updatePositionPrecise" && data.position) {
    state.menuX = data.position.x !== undefined ? data.position.x : state.menuX;
    state.menuY = data.position.y !== undefined ? data.position.y : state.menuY;
    applyPositions();
  }
  if (data.action === "setScale" && data.scale) {
    state.menuScale = data.scale;
    applyScale();
  }
});

function showNotification(type, title, desc, duration) {
  const wrapper = document.getElementById("notifWrapper");
  const el = document.createElement("div");
  el.className = "Notification";
  el.innerHTML = `<div><div class="NotificationTitle">${title}</div><div class="NotificationDesc">${desc}</div></div>`;
  wrapper.appendChild(el);
  requestAnimationFrame(() => { el.offsetWidth; el.classList.add("enter"); });
  setTimeout(() => { el.classList.remove("enter"); setTimeout(() => el.remove(), 500); }, duration);
}

// Keyboard
function skipDivider(items, idx, dir) {
  let ni = idx;
  while (ni >= 0 && ni < items.length && items[ni] && items[ni].type === "divider") {
    ni += dir;
    if (ni < 0) ni = items.length - 1;
    if (ni >= items.length) ni = 0;
    if (ni === idx) break;
  }
  return ni;
}

document.addEventListener("keydown", (e) => {
  // Drag mode: only backspace exits
  if (state.dragMode) {
    if (e.key === "Backspace") {
      e.preventDefault();
      exitDragMode();
    }
    return;
  }

  if (!state.visible && e.key !== "F6") return;

  const items = getCurrentItems();
  const total = items.length;

  if (e.key === "F6") {
    state.visible = !state.visible;
    if (state.visible) { state.depth = 0; state.selectedIndex = 0; state.scrollOffset = 0; }
    render();
    return;
  }
  if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") {
    e.preventDefault();
    let ni = state.selectedIndex - 1;
    if (ni < 0) ni = total - 1;
    state.selectedIndex = skipDivider(items, ni, -1);
    render();
  }
  if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") {
    e.preventDefault();
    let ni = state.selectedIndex + 1;
    if (ni >= total) ni = 0;
    state.selectedIndex = skipDivider(items, ni, 1);
    render();
  }
  if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
    if (state.depth === 2) {
      const item = items[state.selectedIndex];
      if (item) {
        if ((item.type === "scrollable" || item.type === "scrollable-checkbox") && item.values) {
          item.value = Math.max(1, (item.value || 1) - 1);
          handleSettingsValueChange(item);
        }
        if ((item.type === "slider" || item.type === "slider-checkbox") && item.min !== undefined) {
          item.value = Math.max(item.min, (item.value || 0) - (item.step || 1));
          handleSettingsValueChange(item);
        }
      }
    }
    render();
  }
  if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
    if (state.depth === 2) {
      const item = items[state.selectedIndex];
      if (item) {
        if ((item.type === "scrollable" || item.type === "scrollable-checkbox") && item.values) {
          item.value = Math.min(item.values.length, (item.value || 1) + 1);
          handleSettingsValueChange(item);
        }
        if ((item.type === "slider" || item.type === "slider-checkbox") && item.max !== undefined) {
          item.value = Math.min(item.max, (item.value || 0) + (item.step || 1));
          handleSettingsValueChange(item);
        }
      }
    }
    render();
  }
  if (e.key === "Enter") {
    const item = items[state.selectedIndex];
    if (item) {
      // depth 0: select category -> go to subtabs
      if (state.depth === 0 && item.type === "subMenu") {
        state.categoryIndex = state.selectedIndex;
        state.depth = 1;
        state.selectedIndex = 0;
        state.scrollOffset = 0;
        state.subMenuStack = [];
        render();
        return;
      }
      // depth 1: select subtab -> go to items
      if (state.depth === 1 && item.type === "subMenu") {
        state.subtabIndex = state.selectedIndex;
        state.depth = 2;
        state.selectedIndex = 0;
        state.scrollOffset = 0;
        state.subMenuStack = [];
        render();
        return;
      }
      // depth 2: toggle/action
      if (item.type === "checkbox" || item.type === "slider-checkbox" || item.type === "scrollable-checkbox") {
        item.checked = !item.checked;
        handleSettingsValueChange(item);
      }
      if (item.type === "subMenu" && state.depth === 2) {
        if (!handleSettingsAction(item)) {
          showNotification("info", item.label, "Submenu opened", 1500);
        }
      }
    }
    render();
  }
  if (e.key === "Backspace" || e.key === "Delete") {
    e.preventDefault();
    if (state.depth === 2 && state.subMenuStack.length > 0) {
      const prev = state.subMenuStack.pop();
      state.selectedIndex = prev.prevSel || 0;
      state.scrollOffset = 0;
    } else if (state.depth === 2) {
      state.depth = 1;
      state.selectedIndex = state.subtabIndex;
      state.scrollOffset = 0;
    } else if (state.depth === 1) {
      state.depth = 0;
      state.selectedIndex = state.categoryIndex;
      state.scrollOffset = 0;
    } else if (state.depth === 0) {
      state.visible = false;
    }
    render();
  }
});

// Auto-show for preview
state.visible = true;
render();
</script>
</body>
</html>
